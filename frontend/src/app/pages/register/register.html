<form action="" class="form-auth">
    <input-component
        type="text"
        label="Name"
        placeholder="Murilo Santos"
        icon="email"
    />
    <input-component 
        type="email"
        label="Email Address"
        placeholder="murilo@email.com"
        icon="email"
    />
    <input-component 
        type="password"
        label="Password"
        placeholder="Enter your password"
        icon="password"
    />
    <input-component 
        type="password"
        placeholder="Repeat you password"
        icon="password"
    />

    <p>Forgot Password?</p>

    <section class="buttons-form">
        <button-component variant="primary">Sign up</button-component>

        <div class="divisor">
            <span>OR</span>
        </div>

        <button-component variant="secondary" (click)="redirectToLogin()">Login now</button-component>
    </section>
</form>
<router-outlet />
